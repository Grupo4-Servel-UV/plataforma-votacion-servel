name: Semantic Pull Request

on:
    # pull_request:
    #     types: [ opened, edited, synchronize, reopened ]

jobs:
    main:
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  # Tipos permitidos
                  types: |
                      feat
                      fix
                      docs
                      style
                      refactor
                      perf
                      test
                      build
                      ci
                      chore
                  # Obliga a que el PR haga referencia a una Issue (ej: feat(api): #11 add validation)
                  subjectPattern: ^(?:\(\w+\))?\s*(?:#\d+\s+)?\w.*$
